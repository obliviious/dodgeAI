services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: o2c
      POSTGRES_PASSWORD: o2c_secret
      POSTGRES_DB: o2c
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o2c -d o2c"]
      interval: 3s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/o2c_neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
